name: Test Suite

# Run on push to main/master and all pull requests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Cancel previous runs if new commit pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: windows-latest  # Must test on Windows for platform-specific issues

    strategy:
      fail-fast: false  # Continue testing other versions if one fails
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'  # Cache pip dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run linting (ruff)
        run: |
          ruff check src/ --output-format=github
        continue-on-error: true  # Don't fail build on lint errors

      - name: Run type checking (mypy)
        run: |
          mypy src/ --ignore-missing-imports
        continue-on-error: true  # Don't fail build on type errors

      - name: Run unit tests
        run: |
          pytest tests/unit -v -m "unit and not slow" --cov=src --cov-report=xml --cov-report=term

      - name: Run integration tests
        run: |
          pytest tests/integration -v -m integration --cov=src --cov-append --cov-report=xml --cov-report=term

      - name: Run GUI tests (smoke tests only)
        run: |
          pytest tests/gui -v -m "gui and smoke" --cov=src --cov-append --cov-report=xml --cov-report=term
        continue-on-error: true  # GUI tests may fail in CI environment

      - name: Check coverage threshold
        run: |
          coverage report --fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: Python-${{ matrix.python-version }}
          fail_ci_if_error: false  # Don't fail if Codecov upload fails
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        if: always()  # Upload even if tests fail
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 30

  performance:
    name: Performance Tests
    runs-on: windows-latest
    # Only run on main branch (not on PRs)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"  # Use latest stable
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run performance benchmarks
        run: |
          pytest tests/performance -v -m performance --benchmark-only --benchmark-json=benchmark.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.json
          retention-days: 90

  slow-tests:
    name: Slow Tests (Full Suite)
    runs-on: windows-latest
    # Only run on main branch or manual trigger
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run all tests (including slow)
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term --timeout=300

      - name: Upload full coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: full-suite
          name: Full-Test-Suite
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
